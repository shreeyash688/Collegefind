<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>All Colleges - CollegeFind</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar">

        <div class="nav-inner">

            <a href="index.html"
               class="logo">
                🎓 CollegeFind
            </a>

            <button class="hamburger"
                    id="hamburger">
                &#9776;
            </button>

            <ul class="nav-links"
                id="navLinks">

                <li><a href="index.html">Home</a></li>

                <li>
                    <a href="colleges.html"
                       class="active">
                        Colleges
                    </a>
                </li>

                <li>
                    <a href="about.html">
                        About
                    </a>
                </li>

            </ul>

        </div>

    </nav>


    <!-- ================= HEADER ================= -->

    <div class="page-header">

        <h1>Explore Colleges</h1>

        <p>
            Browse and filter colleges across India
        </p>

    </div>



    <!-- ================= FILTERS ================= -->

    <section class="section">

        <div class="filters-bar">

            <input
                type="text"
                id="searchInput"
                class="filter-input"
                placeholder="Search college name or city...">

            <select
                id="stateFilter"
                class="filter-select">

                <option value="">All States</option>

                <option>Maharashtra</option>
                <option>Karnataka</option>
                <option>Tamil Nadu</option>
                <option>Delhi</option>
                <option>West Bengal</option>
                <option>Telangana</option>
                <option>Gujarat</option>

            </select>


            <select
                id="typeFilter"
                class="filter-select">

                <option value="">All Types</option>

                <option>Government</option>

                <option>Private</option>

                <option>Deemed</option>

            </select>


            <button
                class="btn-reset"
                onclick="resetFilters()">

                Reset

            </button>

        </div>



        <p
            class="result-count"
            id="resultCount">

        </p>


        <div
            class="cards-grid"
            id="collegesGrid">

        </div>


        <div
            id="noResults"
            class="no-results"
            style="display:none">

            <p>

                😕 No colleges found.

            </p>

        </div>

    </section>



    <!-- ================= FOOTER ================= -->

    <footer class="footer">

        <div class="footer-inner">

            <p>

                🎓
                <strong>CollegeFind</strong>

                —
                Internship Project

            </p>

        </div>

    </footer>


    <script src="colleges.js"></script>

</body>

</html>
